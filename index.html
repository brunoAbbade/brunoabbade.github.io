<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bruno Abbade — Apps</title>
  <meta name="description" content="Apps e jogos para iOS e Android, feitos por Bruno Abbade." />
  <style>
    :root {
      --bg: #05070f;
      --bg-2: #0a0e2e;
      --bg-card: rgba(255, 255, 255, 0.045);
      --border: rgba(255, 255, 255, 0.09);
      --text: #f2f3f8;
      --text-secondary: #9aa0bd;
      --accent: #6c7bff;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }
    a { color: inherit; }
    img { max-width: 100%; display: block; }

    /* ---------- top bar ---------- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 16px 24px;
      backdrop-filter: blur(14px);
      background: rgba(5, 7, 15, 0.72);
      border-bottom: 1px solid var(--border);
    }
    .lang-switcher {
      display: flex;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .lang-switcher button {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 6px 11px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      font-family: inherit;
    }
    .lang-switcher button.active { background: var(--accent); color: white; }

    /* ---------- hero ---------- */
    .hero {
      max-width: 720px;
      margin: 0 auto;
      padding: 76px 24px 40px;
      text-align: center;
    }
    .hero-eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hero h1 {
      font-size: clamp(32px, 5vw, 46px);
      margin: 0 0 14px;
      letter-spacing: -0.02em;
    }
    .hero p {
      color: var(--text-secondary);
      font-size: 16px;
      max-width: 520px;
      margin: 0 auto;
    }
    .hero-apps-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 32px;
    }
    .hero-apps-row a {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.15s ease;
    }
    .hero-apps-row a:hover { transform: translateY(-3px); }
    .hero-apps-row img { width: 100%; height: 100%; object-fit: cover; }

    /* ---------- app showcase ---------- */
    main { max-width: 1080px; margin: 0 auto; padding: 20px 24px 40px; }

    .showcase {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 56px;
      align-items: center;
      padding: 64px 0;
      border-top: 1px solid var(--border);
    }
    .showcase:first-child { border-top: none; }
    .showcase.reverse { grid-template-columns: 1fr 320px; }
    .showcase.reverse .showcase-devices { order: 2; }
    .showcase.reverse .showcase-content { order: 1; }

    .showcase-devices {
      position: relative;
      display: flex;
      justify-content: center;
      padding: 20px 0;
    }

    .device-frame {
      position: relative;
      background: #14162a;
      border-radius: 34px;
      padding: 9px;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }
    .device-frame.phone { width: 210px; aspect-ratio: 9 / 19.5; z-index: 2; }
    .device-frame.tablet {
      width: 260px;
      aspect-ratio: 3 / 4;
      border-radius: 26px;
      position: absolute;
      right: -18px;
      bottom: -6px;
      z-index: 1;
      opacity: 0.88;
      filter: brightness(0.72) saturate(0.9);
    }
    .device-frame .screen {
      width: 100%;
      height: 100%;
      border-radius: 25px;
      overflow: hidden;
      background: #000;
      position: relative;
    }
    .device-frame.tablet .screen { border-radius: 18px; }
    .device-frame .screen img,
    .device-frame .screen video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .device-frame.phone::before {
      content: "";
      position: absolute;
      top: 9px;
      left: 50%;
      transform: translateX(-50%);
      width: 72px;
      height: 18px;
      background: #14162a;
      border-radius: 0 0 12px 12px;
      z-index: 3;
    }
    .screen.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--placeholder-gradient, linear-gradient(160deg, #333, #111));
    }
    .screen.placeholder img {
      width: 38%;
      height: auto;
      border-radius: 22%;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.4);
    }

    .showcase-content { min-width: 0; }
    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .app-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .app-name { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
    .app-tagline { color: var(--text-secondary); font-size: 13.5px; margin: 2px 0 0; }
    .app-description {
      font-size: 15px;
      color: var(--text-secondary);
      margin: 0 0 18px;
      max-width: 460px;
    }
    .features {
      list-style: none;
      margin: 0 0 20px;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 9px;
      max-width: 500px;
    }
    .features li {
      font-size: 13.5px;
      color: var(--text);
      display: flex;
      align-items: baseline;
      gap: 7px;
    }
    .features li::before { content: "•"; color: var(--accent); font-weight: bold; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .badge {
      display: inline-block;
      font-size: 10.5px;
      font-weight: 700;
      padding: 5px 11px;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }
    .badge-live { background: rgba(70, 200, 120, 0.15); color: #5fd98a; }
    .badge-dev { background: rgba(255, 196, 70, 0.15); color: #ffd370; }
    .store-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
    .store-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .store-link-android { background: #34a853; }
    .store-link:hover { opacity: 0.9; }
    .legal-links { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 16px; }
    .legal-links a {
      color: var(--text-secondary);
      font-size: 12px;
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .legal-links a:hover { color: var(--accent); }

    @media (max-width: 760px) {
      .showcase, .showcase.reverse {
        grid-template-columns: 1fr;
        gap: 32px;
        text-align: center;
        padding: 44px 0;
      }
      .showcase.reverse .showcase-devices,
      .showcase.reverse .showcase-content { order: initial; }
      .app-header { justify-content: center; }
      .app-description, .features { margin-left: auto; margin-right: auto; }
      .features { text-align: left; }
      .store-links, .badge-row, .legal-links { justify-content: center; }
      .device-frame.tablet { right: 4px; }
    }

    footer {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 24px 56px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--text-secondary); }
  </style>
</head>

    function renderMedia(app) {
      const wrap = document.createElement('div');
      wrap.className = 'showcase-devices';

      const phone = document.createElement('div');
      phone.className = 'device-frame phone';
      const phoneScreen = document.createElement('div');
      phoneScreen.className = 'screen';

      if (app.media.type === 'placeholder') {
        phoneScreen.classList.add('placeholder');
        phoneScreen.style.setProperty('--placeholder-gradient', app.gradient);
        const icon = document.createElement('img');
        icon.src = app.icon;
        icon.alt = app.i18n[currentLang].name;
        phoneScreen.appendChild(icon);
      } else if (app.media.type === 'video') {
        const video = document.createElement('video');
        video.src = app.media.phone;
        video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true;
        phoneScreen.appendChild(video);
      } else {
        const img = document.createElement('img');
        img.src = app.media.phone;
        img.alt = app.i18n[currentLang].name;
        img.loading = 'lazy';
        phoneScreen.appendChild(img);
      }
      phone.appendChild(phoneScreen);
      wrap.appendChild(phone);

      if (app.media.tablet) {
        const tablet = document.createElement('div');
        tablet.className = 'device-frame tablet';
        const tabletScreen = document.createElement('div');
        tabletScreen.className = 'screen';
        if (app.media.type === 'video') {
          const video = document.createElement('video');
          video.src = app.media.tablet;
          video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true;
          tabletScreen.appendChild(video);
        } else {
          const img = document.createElement('img');
          img.src = app.media.tablet;
          img.alt = app.i18n[currentLang].name;
          img.loading = 'lazy';
          tabletScreen.appendChild(img);
        }
        tablet.appendChild(tabletScreen);
        wrap.appendChild(tablet);
      }

      return wrap;
    }

    function renderBadges(app, t) {
      const row = document.createElement('div');
      row.className = 'badge-row';
      app.badges.forEach(function (b) {
        const span = document.createElement('span');
        if (b === 'live') { span.className = 'badge badge-live'; span.textContent = t.liveBadge; }
        if (b === 'live-android') { span.className = 'badge badge-live'; span.textContent = t.liveAndroidBadge; }
        if (b === 'dev-ios') { span.className = 'badge badge-dev'; span.textContent = t.devIosBadge; }
        row.appendChild(span);
      });
      return row;
    }

    function renderApp(app, index) {
      const t = app.i18n[currentLang];

      const section = document.createElement('section');
      section.className = 'showcase' + (index % 2 === 1 ? ' reverse' : '');

      section.appendChild(renderMedia(app));

      const content = document.createElement('div');
      content.className = 'showcase-content';

      const header = document.createElement('div');
      header.className = 'app-header';
      const iconWrap = document.createElement('div');
      iconWrap.className = 'app-icon';
      const iconImg = document.createElement('img');
      iconImg.src = app.icon;
      iconImg.alt = t.name;
      iconWrap.appendChild(iconImg);
      const nameWrap = document.createElement('div');
      const name = document.createElement('p');
      name.className = 'app-name';
      name.textContent = t.name;
      const tagline = document.createElement('p');
      tagline.className = 'app-tagline';
      tagline.textContent = t.tagline;
      nameWrap.append(name, tagline);
      header.append(iconWrap, nameWrap);

      const desc = document.createElement('p');
      desc.className = 'app-description';
      desc.textContent = t.description;

      const features = document.createElement('ul');
      features.className = 'features';
      t.features.forEach(function (f) {
        const li = document.createElement('li');
        li.textContent = f;
        features.appendChild(li);
      });

      const badges = renderBadges(app, t);

      const storeLinks = document.createElement('div');
      storeLinks.className = 'store-links';
      if (app.ios) {
        const a = document.createElement('a');
        a.className = 'store-link';
        a.href = app.ios;
        a.textContent = t.iosLabel;
        storeLinks.appendChild(a);
      }
      if (app.android) {
        const a = document.createElement('a');
        a.className = 'store-link store-link-android';
        a.href = app.android;
        a.textContent = t.androidLabel;
        storeLinks.appendChild(a);
      }

      const legal = document.createElement('div');
      legal.className = 'legal-links';
      const priv = document.createElement('a');
      priv.href = app.privacy;
      priv.textContent = t.privacyLabel;
      const sup = document.createElement('a');
      sup.href = app.support;
      sup.textContent = t.supportLabel;
      legal.append(priv, sup);

      content.append(header, desc, features, badges, storeLinks, legal);
      section.appendChild(content);
      return section;
    }

    function renderHeroApps() {
      const row = document.getElementById('hero-apps');
      row.innerHTML = '';
      APPS.forEach(function (app) {
        const a = document.createElement('a');
        a.href = '#' + app.id;
        const img = document.createElement('img');
        img.src = app.icon;
        img.alt = app.i18n[currentLang].name;
        a.appendChild(img);
        row.appendChild(a);
      });
    }

    var currentLang = 'pt';

    function render() {
      const t = SITE_I18N[currentLang];
      document.querySelectorAll('[data-t]').forEach(function (el) {
        el.textContent = t[el.getAttribute('data-t')];
      });
      renderHeroApps();
      const list = document.getElementById('app-list');
      list.innerHTML = '';
      APPS.forEach(function (app, i) {
        const section = renderApp(app, i);
        section.id = app.id;
        list.appendChild(section);
      });
    }

    function setLang(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-lang-btn]').forEach(function (btn) {
        btn.classList.toggle('active', btn.getAttribute('data-lang-btn') === lang);
      });
      localStorage.setItem('lang', lang);
      render();
    }

    document.querySelectorAll('[data-lang-btn]').forEach(function (btn) {
      btn.addEventListener('click', function () { setLang(btn.getAttribute('data-lang-btn')); });
    });

    setLang(localStorage.getItem('lang') || 'pt');
  </script>
</body>
</html>
