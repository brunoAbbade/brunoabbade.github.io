<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>More Apps</title>
  <style>
    :root {
      --bg: #0a0e2e;
      --bg-card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f2f3f8;
      --text-secondary: #aab0c8;
      --accent: #6c7bff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #0a0e2e 0%, #050714 100%);
      color: var(--text);
      line-height: 1.4;
      overscroll-behavior: none;
    }
    header {
      padding: 64px 20px 12px;
      text-align: center;
    }
    header h1 {
      font-size: 20px;
      margin: 0 0 4px;
    }
    header p {
      color: var(--text-secondary);
      margin: 0;
      font-size: 13px;
    }
    main {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .app-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .app-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
    }
    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .app-info {
      flex: 1;
      min-width: 0;
    }
    .app-name {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
    }
    .app-tagline {
      color: var(--text-secondary);
      font-size: 12px;
      margin: 2px 0 0;
    }
    .app-action {
      flex-shrink: 0;
    }
    .open-button {
      display: inline-block;
      padding: 9px 14px;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .badge-soon {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 196, 70, 0.15);
      color: #ffd370;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      padding: 32px 20px;
    }
    .lang-switcher {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    .lang-switcher button {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
    }
    .lang-switcher button.active {
      background: var(--accent);
      color: white;
    }
  </style>
</head>
<body>
  <div class="lang-switcher">
    <button data-lang-btn="en">EN</button>
    <button data-lang-btn="pt">PT</button>
    <button data-lang-btn="es">ES</button>
  </div>

  <header>
    <h1 id="header-title"></h1>
    <p id="header-subtitle"></p>
  </header>

  <main id="app-list"></main>

  <script>
    const I18N = {
      en: {
        headerTitle: 'Discover more apps',
        headerSubtitle: 'Made by the same developer',
        openBtn: 'Open →',
        comingSoon: 'COMING SOON',
        emptyState: 'No other apps available here yet.',
        taglines: {
          'cifras-praise': 'Gospel chords and praise music',
          'merge-rise': 'Merge puzzle with level progression',
          'snap-puzzle': 'Photo puzzle with your own pictures',
        },
      },
      pt: {
        headerTitle: 'Conheça outros apps',
        headerSubtitle: 'Feitos pelo mesmo desenvolvedor',
        openBtn: 'Abrir →',
        comingSoon: 'EM BREVE',
        emptyState: 'Nenhum outro app disponível por aqui ainda.',
        taglines: {
          'cifras-praise': 'Cifras para louvor e adoração',
          'merge-rise': 'Puzzle de fusão com progressão por níveis',
          'snap-puzzle': 'Quebra-cabeça com suas próprias fotos',
        },
      },
      es: {
        headerTitle: 'Descubre más apps',
        headerSubtitle: 'Hechas por el mismo desarrollador',
        openBtn: 'Abrir →',
        comingSoon: 'PRÓXIMAMENTE',
        emptyState: 'Aún no hay otras apps disponibles aquí.',
        taglines: {
          'cifras-praise': 'Cifras de alabanza y adoración',
          'merge-rise': 'Puzzle de fusión con progresión por niveles',
          'snap-puzzle': 'Rompecabezas con tus propias fotos',
        },
      },
    };

    const APPS = [
      {
        id: 'cifras-praise',
        name: 'Renascer Praise Cifras',
        icon: 'icons/cifras-praise.png',
        status: 'live',
        deepLink: 'cifraspraise://open',
        ios: 'https://apps.apple.com/br/app/renascer-praise-cifras/id6780117518',
        android: 'https://play.google.com/store/apps/details?id=com.boliveira.cifraspraise&hl=pt_BR',
      },
      {
        id: 'merge-rise',
        name: 'Merge Rise',
        icon: 'icons/merge-rise.png',
        status: 'live',
        deepLink: 'mergerise://open',
        ios: 'https://apps.apple.com/br/app/merge-rise/id6781752965',
        android: 'https://play.google.com/store/apps/details?id=com.brunoabbade.merge_rise_game&hl=pt_BR',
      },
      {
        id: 'snap-puzzle',
        name: 'Snap Puzzle',
        icon: 'icons/snap-puzzle.png',
        status: 'live',
        deepLink: 'snappuzzle://open',
        ios: 'https://apps.apple.com/br/app/snap-puzzle/id6782507078',
        android: 'https://play.google.com/store/apps/details?id=com.babbade.snap_puzzle&hl=pt_BR',
      },
    ];

    var currentLang = 'en';

    function detectStoreUrl(app) {
      var ua = navigator.userAgent;
      var isAndroid = /android/i.test(ua);
      var isIOS = /iphone|ipad|ipod/i.test(ua);
      if (isAndroid) return app.android || '';
      if (isIOS) return app.ios || '';
      return app.android || app.ios;
    }

    function openApp(app) {
      var storeUrl = detectStoreUrl(app);
      if (!storeUrl) return;

      if (!app.deepLink) {
        window.location.href = storeUrl;
        return;
      }

      if (window.CrossPromoBridge) {
        window.CrossPromoBridge.postMessage(
          JSON.stringify({ deepLink: app.deepLink, storeUrl: storeUrl })
        );
        return;
      }

      var appOpened = false;
      var markOpened = function () { appOpened = true; };
      document.addEventListener('visibilitychange', markOpened, { once: true });
      window.addEventListener('pagehide', markOpened, { once: true });

      window.location.href = app.deepLink;

      setTimeout(function () {
        document.removeEventListener('visibilitychange', markOpened);
        window.removeEventListener('pagehide', markOpened);
        if (!appOpened) window.location.href = storeUrl;
      }, 1500);
    }

    function renderIcon(app) {
      if (app.icon && app.icon.includes('/')) {
        var img = document.createElement('img');
        img.src = app.icon;
        img.alt = app.name;
        return img;
      }
      var span = document.createElement('span');
      span.textContent = app.icon || '📱';
      return span;
    }

    function renderApp(app) {
      var t = I18N[currentLang];
      var card = document.createElement('section');
      card.className = 'app-card';

      var icon = document.createElement('div');
      icon.className = 'app-icon';
      icon.appendChild(renderIcon(app));

      var info = document.createElement('div');
      info.className = 'app-info';
      var name = document.createElement('p');
      name.className = 'app-name';
      name.textContent = app.name;
      var tagline = document.createElement('p');
      tagline.className = 'app-tagline';
      tagline.textContent = t.taglines[app.id] || '';
      info.append(name, tagline);

      var action = document.createElement('div');
      action.className = 'app-action';
      var canOpen = app.status === 'live' && !!detectStoreUrl(app);
      if (canOpen) {
        var button = document.createElement('button');
        button.className = 'open-button';
        button.type = 'button';
        button.textContent = t.openBtn;
        button.addEventListener('click', function () { openApp(app); });
        action.appendChild(button);
      } else {
        var badge = document.createElement('span');
        badge.className = 'badge-soon';
        badge.textContent = t.comingSoon;
        action.appendChild(badge);
      }

      card.append(icon, info, action);
      return card;
    }

    function applyAccentFromQuery() {
      var accent = new URLSearchParams(window.location.search).get('accent');
      if (accent && /^[0-9a-fA-F]{6}$/.test(accent)) {
        document.documentElement.style.setProperty('--accent', '#' + accent);
      }
    }

    function render() {
      applyAccentFromQuery();
      var t = I18N[currentLang];
      document.getElementById('header-title').textContent = t.headerTitle;
      document.getElementById('header-subtitle').textContent = t.headerSubtitle;

      var currentId = new URLSearchParams(window.location.search).get('from');
      var others = APPS.filter(function (app) { return app.id !== currentId; });
      var list = document.getElementById('app-list');
      list.innerHTML = '';

      if (others.length === 0) {
        var empty = document.createElement('p');
        empty.className = 'empty-state';
        empty.textContent = t.emptyState;
        list.appendChild(empty);
        return;
      }

      others.forEach(function (app) { list.appendChild(renderApp(app)); });
    }

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('[data-lang-btn]').forEach(function (btn) {
        btn.classList.toggle('active', btn.getAttribute('data-lang-btn') === lang);
      });
      localStorage.setItem('lang', lang);
      render();
    }

    document.querySelectorAll('[data-lang-btn]').forEach(function (btn) {
      btn.addEventListener('click', function () { setLang(btn.getAttribute('data-lang-btn')); });
    });

    setLang(localStorage.getItem('lang') || 'en');
  </script>
</body>
</html>
