<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suporte — Merge Rise</title>
  <style>
    :root {
      --bg: #0a0e2e;
      --bg-card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f2f3f8;
      --text-secondary: #aab0c8;
      --accent: #6c7bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #0a0e2e 0%, #050714 100%);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px 64px;
    }
    a { color: var(--accent); }
    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
    }
    h1 { font-size: 26px; margin: 0 0 24px; }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .email-box {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 20px;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main>
    <a class="back-link" href="./">← Voltar</a>

    <h1>🛟 Suporte — Merge Rise</h1>

    <div class="card">
      <p>Precisa de ajuda, encontrou um problema ou tem uma sugestão para o app Merge Rise?</p>
      <p>Entre em contato pelo e-mail: <strong>developercifraspraise@gmail.com</strong></p>
      <a class="email-box" href="mailto:developercifraspraise@gmail.com">Clique aqui para enviar um e-mail →</a>
      <p style="margin-top: 20px;">Responderemos o mais breve possível.</p>
    </div>
  </main>
</body>
</html>
